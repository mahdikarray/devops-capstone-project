---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: flake8
spec:
  description: Run flake8 linter
  workspaces:
    - name: source
  params:
    - name: image
      type: string
      default: python:3.9-slim
    - name: args
      type: array
  steps:
    - name: flake8
      image: $(params.image)
      workingDir: $(workspaces.source.path)
      script: |
        pip install flake8
        flake8 service